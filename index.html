<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>netmon dashboard</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 1em; color: #222; background: #fafafa; }
  h1 { font-size: 1.3em; margin: 0 0 0.5em; }
  .controls { display: flex; flex-wrap: wrap; gap: 0.6em; align-items: center; margin-bottom: 1em; }
  .tiles { display: grid; grid-template-columns: repeat(5, 1fr); gap: 0.75em; margin-bottom: 1em; }
  .tile { background: #fff; padding: 0.75em; border-radius: 4px; border: 1px solid #ddd; }
  .tile-label { font-size: 0.75em; color: #666; text-transform: uppercase; letter-spacing: 0.04em; }
  .tile-value { font-size: 1.6em; font-weight: 600; margin-top: 0.2em; font-variant-numeric: tabular-nums; }
  .panel { background: #fff; padding: 0.9em 1em; border-radius: 4px; border: 1px solid #ddd; margin-bottom: 1em; }
  .panel h2 { font-size: 1em; margin: 0 0 0.5em; color: #444; }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1em; }
  table { border-collapse: collapse; width: 100%; font-size: 0.9em; }
  th, td { text-align: left; padding: 0.3em 0.5em; border-bottom: 1px solid #eee; }
  th { background: #f4f4f4; font-weight: 600; }
  .num { text-align: right; font-variant-numeric: tabular-nums; }
  .bar { height: 6px; background: #e6ecff; border-radius: 2px; overflow: hidden; margin-top: 2px; }
  .bar > div { height: 100%; background: #5a78d6; }
  .sev-high { color: #b00; font-weight: 600; }
  .sev-medium { color: #c60; font-weight: 600; }
  .sev-low { color: #888; }
  .chart { width: 100%; height: 220px; display: block; }
  button { padding: 0.4em 0.8em; border: 1px solid #bbb; background: #fff; border-radius: 4px; cursor: pointer; font: inherit; }
  button.active { background: #226; color: #fff; border-color: #226; }
  select { padding: 0.4em; border: 1px solid #bbb; border-radius: 4px; font: inherit; }
  .muted { color: #888; font-size: 0.85em; }
  .legend { font-size: 0.8em; color: #444; }
  .legend span { display: inline-block; margin-right: 1em; }
  .swatch { display: inline-block; width: 14px; height: 3px; vertical-align: middle; margin-right: 4px; }
  @media (max-width: 800px) { .row2 { grid-template-columns: 1fr; } .tiles { grid-template-columns: repeat(2, 1fr); } }
</style>
</head>
<body>
  <h1>netmon dashboard <span id="health" class="muted"></span></h1>
  <div class="controls">
    <span>Window:</span>
    <button data-days="1">last 24h</button>
    <button data-days="7">7 days</button>
    <button data-days="30">30 days</button>
    <span style="margin-left:1em">Device:</span>
    <select id="deviceSelect"><option value="">All devices</option></select>
    <span class="muted" id="status"></span>
  </div>

  <div class="tiles">
    <div class="tile"><div class="tile-label">Flows</div><div class="tile-value" id="t-flows">&ndash;</div></div>
    <div class="tile"><div class="tile-label">Bytes</div><div class="tile-value" id="t-bytes">&ndash;</div></div>
    <div class="tile"><div class="tile-label">Countries</div><div class="tile-value" id="t-cc-count">&ndash;</div></div>
    <div class="tile"><div class="tile-label">ASNs</div><div class="tile-value" id="t-asn-count">&ndash;</div></div>
    <div class="tile"><div class="tile-label">TI hits</div><div class="tile-value" id="t-ti">&ndash;</div></div>
  </div>

  <div class="panel">
    <h2>Daily traffic <span class="legend"><span><span class="swatch" style="background:#226"></span>bytes</span><span><span class="swatch" style="background:#c60"></span>flows</span></span></h2>
    <svg id="chart" class="chart"></svg>
  </div>

  <div class="row2">
    <div class="panel">
      <h2>By country</h2>
      <table>
        <thead><tr><th>Country</th><th class="num">Flows</th><th class="num">Bytes</th><th class="num">Packets</th></tr></thead>
        <tbody id="countryTable"></tbody>
      </table>
    </div>
    <div class="panel">
      <h2>By ASN</h2>
      <table>
        <thead><tr><th>ASN</th><th>Organization</th><th class="num">Flows</th><th class="num">Bytes</th><th class="num">Packets</th></tr></thead>
        <tbody id="asnTable"></tbody>
      </table>
    </div>
  </div>

  <div class="panel">
    <h2>Recent alerts</h2>
    <table>
      <thead>
        <tr><th>Time (UTC)</th><th>Sev</th><th>Kind</th><th>Device</th><th>Destination</th><th>ASN</th><th>CC</th><th>Sources</th><th class="num">Bytes</th></tr>
      </thead>
      <tbody id="alertTable"></tbody>
    </table>
  </div>

<script>
const state = { days: 1, device: "" };
const NS = "http://www.w3.org/2000/svg";

function fmtBytes(n) {
  n = Number(n) || 0;
  if (n < 1024) return n + " B";
  const u = ["KB", "MB", "GB", "TB", "PB"];
  let v = n / 1024;
  for (let i = 0; i < u.length; i++) {
    if (v < 1024) return v.toFixed(v >= 10 ? 0 : 1) + " " + u[i];
    v /= 1024;
  }
  return v.toFixed(0) + " EB";
}
function fmtNum(n) { return (Number(n) || 0).toLocaleString(); }
function fmtTime(ts) {
  return new Date(ts * 1000).toISOString().replace("T", " ").replace(/\..*/, "");
}
function escapeHTML(s) {
  return String(s == null ? "" : s).replace(/[&<>"']/g, c => (
    {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]
  ));
}

async function loadDevices() {
  const r = await fetch("/api/devices").then(r => r.json());
  const sel = document.getElementById("deviceSelect");
  const cur = sel.value;
  sel.innerHTML = '<option value="">All devices</option>';
  for (const d of r.devices || []) {
    const opt = document.createElement("option");
    opt.value = d.ip;
    opt.textContent = d.hostname ? d.ip + " — " + d.hostname : d.ip;
    sel.appendChild(opt);
  }
  sel.value = cur;
}

async function loadHealth() {
  try {
    const h = await fetch("/api/health").then(r => r.json());
    const el = document.getElementById("health");
    if (h.last_state_write_ts) {
      const age = Math.max(0, Math.floor(Date.now()/1000 - h.last_state_write_ts));
      const mins = Math.floor(age / 60);
      el.textContent = mins + " min since last analyzer tick";
    }
  } catch (e) { /* ignore */ }
}

async function loadAll() {
  document.getElementById("status").textContent = "loading…";
  const params = new URLSearchParams({ days: state.days });
  if (state.device) params.set("device", state.device);
  try {
    const [summary, tsResp, alertsResp] = await Promise.all([
      fetch("/api/summary?" + params).then(r => r.json()),
      fetch("/api/timeseries?" + params).then(r => r.json()),
      fetch("/api/alerts?" + params + "&limit=50").then(r => r.json()),
    ]);
    renderTiles(summary.totals || {});
    renderCountries(summary.countries || []);
    renderASNs(summary.asns || []);
    renderChart(tsResp.buckets || []);
    renderAlerts(alertsResp.alerts || [], alertsResp.truncated);
    document.getElementById("status").textContent = "";
  } catch (e) {
    document.getElementById("status").textContent = "load failed: " + e;
  }
}

function renderTiles(t) {
  document.getElementById("t-flows").textContent = fmtNum(t.flows);
  document.getElementById("t-bytes").textContent = fmtBytes(t.bytes || 0);
  document.getElementById("t-cc-count").textContent = fmtNum(t.country_count);
  document.getElementById("t-asn-count").textContent = fmtNum(t.asn_count);
  document.getElementById("t-ti").textContent = fmtNum(t.ti_hits);
}

function renderBreakdown(tbody, rows, leadingCols, maxBytes) {
  tbody.innerHTML = "";
  if (!rows.length) {
    tbody.innerHTML = '<tr><td colspan="' + (leadingCols + 3) + '" class="muted">no data in window</td></tr>';
    return;
  }
  for (const r of rows) {
    const tr = document.createElement("tr");
    let html = r.cells.join("");
    const pct = maxBytes ? Math.max(2, (r.bytes / maxBytes) * 100) : 0;
    html += '<td class="num">' + fmtNum(r.flows) + "</td>";
    html += '<td class="num">' + fmtBytes(r.bytes) +
            '<div class="bar"><div style="width:' + pct.toFixed(1) + '%"></div></div></td>';
    html += '<td class="num">' + fmtNum(r.packets) + "</td>";
    tr.innerHTML = html;
    tbody.appendChild(tr);
  }
}

function renderCountries(countries) {
  const tb = document.getElementById("countryTable");
  const maxB = Math.max(0, ...countries.map(c => c.bytes));
  const rows = countries.slice(0, 30).map(c => ({
    flows: c.flows, bytes: c.bytes, packets: c.packets,
    cells: ["<td>" + escapeHTML(c.country || "(unknown)") + "</td>"],
  }));
  renderBreakdown(tb, rows, 1, maxB);
}

function renderASNs(asns) {
  const tb = document.getElementById("asnTable");
  const maxB = Math.max(0, ...asns.map(a => a.bytes));
  const rows = asns.slice(0, 30).map(a => ({
    flows: a.flows, bytes: a.bytes, packets: a.packets,
    cells: [
      "<td>" + (a.asn ? "AS" + a.asn : "(unknown)") + "</td>",
      "<td>" + escapeHTML(a.asn_org || "") + "</td>",
    ],
  }));
  renderBreakdown(tb, rows, 2, maxB);
}

function svgEl(name, attrs) {
  const e = document.createElementNS(NS, name);
  for (const k in attrs) e.setAttribute(k, attrs[k]);
  return e;
}

let lastChartBuckets = [];
function renderChart(buckets) {
  lastChartBuckets = buckets;
  const svg = document.getElementById("chart");
  const W = Math.max(320, svg.clientWidth || 800);
  const H = 220, P = 32;
  svg.setAttribute("viewBox", "0 0 " + W + " " + H);
  svg.innerHTML = "";
  if (buckets.length === 0) {
    const t = svgEl("text", {x: W/2, y: H/2, "text-anchor": "middle", fill: "#888"});
    t.textContent = "no data";
    svg.appendChild(t);
    return;
  }
  const maxB = Math.max(1, ...buckets.map(b => b.bytes));
  const maxF = Math.max(1, ...buckets.map(b => b.flows));
  const n = buckets.length;
  const xStep = n > 1 ? (W - 2*P) / (n - 1) : 0;
  const xAt = i => n > 1 ? P + i*xStep : W/2;
  const ptsB = buckets.map((b, i) => xAt(i) + "," + (H - P - (b.bytes / maxB) * (H - 2*P))).join(" ");
  const ptsF = buckets.map((b, i) => xAt(i) + "," + (H - P - (b.flows / maxF) * (H - 2*P))).join(" ");
  svg.appendChild(svgEl("line", {x1: P, y1: H-P, x2: W-P, y2: H-P, stroke: "#bbb"}));
  svg.appendChild(svgEl("polyline", {points: ptsB, fill: "none", stroke: "#226", "stroke-width": "2"}));
  svg.appendChild(svgEl("polyline", {points: ptsF, fill: "none", stroke: "#c60", "stroke-width": "2"}));
  buckets.forEach((b, i) => {
    svg.appendChild(svgEl("circle", {cx: xAt(i), cy: H - P - (b.bytes / maxB) * (H - 2*P), r: 2.5, fill: "#226"}));
    svg.appendChild(svgEl("circle", {cx: xAt(i), cy: H - P - (b.flows / maxF) * (H - 2*P), r: 2.5, fill: "#c60"}));
  });
  const skip = Math.max(1, Math.ceil(n / 8));
  buckets.forEach((b, i) => {
    if (i % skip === 0 || i === n - 1) {
      const t = svgEl("text", {x: xAt(i), y: H - 10, "text-anchor": "middle", "font-size": "10", fill: "#666"});
      t.textContent = b.date.slice(5);
      svg.appendChild(t);
    }
  });
  const t1 = svgEl("text", {x: 4, y: P + 4, "font-size": "10", fill: "#226"});
  t1.textContent = fmtBytes(maxB);
  svg.appendChild(t1);
  const t2 = svgEl("text", {x: W - 4, y: P + 4, "text-anchor": "end", "font-size": "10", fill: "#c60"});
  t2.textContent = fmtNum(maxF) + " flows";
  svg.appendChild(t2);
}

function renderAlerts(alerts, truncated) {
  const tb = document.getElementById("alertTable");
  tb.innerHTML = "";
  for (const a of alerts) {
    const tr = document.createElement("tr");
    const sev = a.severity || "low";
    const dst = (a.dst_ip || "") + (a.dst_port ? ":" + a.dst_port : "");
    tr.innerHTML =
      "<td>" + fmtTime(a.ts) + "</td>" +
      '<td class="sev-' + escapeHTML(sev) + '">' + escapeHTML(sev.toUpperCase()) + "</td>" +
      "<td>" + escapeHTML(a.kind || "") + "</td>" +
      "<td>" + escapeHTML(a.internal_ip || "") + "</td>" +
      "<td>" + escapeHTML(dst) + "</td>" +
      "<td>" + (a.asn ? "AS" + a.asn : "") + "</td>" +
      "<td>" + escapeHTML(a.country || "") + "</td>" +
      "<td>" + escapeHTML(a.sources || "") + "</td>" +
      '<td class="num">' + fmtBytes(a.bytes || 0) + "</td>";
    tb.appendChild(tr);
  }
  if (alerts.length === 0) {
    tb.innerHTML = '<tr><td colspan="9" class="muted">no alerts in window</td></tr>';
  } else if (truncated) {
    const tr = document.createElement("tr");
    tr.innerHTML = '<td colspan="9" class="muted">(showing latest 50; older alerts omitted)</td>';
    tb.appendChild(tr);
  }
}

document.querySelectorAll("[data-days]").forEach(b => {
  b.addEventListener("click", () => {
    state.days = parseInt(b.dataset.days);
    document.querySelectorAll("[data-days]").forEach(x => x.classList.toggle("active", x === b));
    loadAll();
  });
});

document.getElementById("deviceSelect").addEventListener("change", e => {
  state.device = e.target.value;
  loadAll();
});

let resizeTimer;
window.addEventListener("resize", () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => renderChart(lastChartBuckets), 100);
});

document.querySelector('[data-days="1"]').classList.add("active");
loadHealth();
loadDevices().then(loadAll);
</script>
</body>
</html>
